<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환율 계산기</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Gowun Dodum', sans-serif;
            background: transparent;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: transparent;
            border-radius: 15px;
            padding: 30px 25px;
        }

        h1 {
            color: #6B4423;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            font-family: 'Gowun Dodum', sans-serif;
        }

        .input-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="number"],
        select,
        button {
            padding: 10px 12px;
            border: 2px solid #6B4423;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Gowun Dodum', sans-serif;
            color: #6B4423;
        }

        input[type="number"] {
            flex: 1;
            min-width: 120px;
            background: white;
        }

        input[type="number"]::placeholder {
            color: #D4A5B3;
            font-family: 'Gowun Dodum', sans-serif;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #6B4423;
            box-shadow: 0 0 0 2px rgba(107, 68, 35, 0.1);
        }

        select {
            flex: 1;
            min-width: 150px;
            background: white;
            cursor: pointer;
            border: 2px solid #6B4423;
            font-family: 'Gowun Dodum', sans-serif;
        }

        select:focus {
            outline: none;
            border-color: #6B4423;
            box-shadow: 0 0 0 2px rgba(107, 68, 35, 0.1);
        }

        button {
            padding: 10px 25px;
            background: #6B4423;
            color: #F3E5AB;
            border: 2px solid #6B4423;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: 'Gowun Dodum', sans-serif;
        }

        button:hover {
            background: #5A3A1F;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(107, 68, 35, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box {
            background: white;
            border: 2px solid #6B4423;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            font-family: 'Gowun Dodum', sans-serif;
        }

        .result-container {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .result-item {
            flex: 1;
            text-align: center;
        }

        .result-label {
            font-size: 11px;
            color: #6B4423;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Gowun Dodum', sans-serif;
        }

        #resultKRW {
            font-size: 20px;
            color: #6B4423;
            font-weight: 700;
            font-family: 'Gowun Dodum', sans-serif;
        }

        #result {
            font-size: 20px;
            color: #FF69B4;
            font-weight: 700;
            font-family: 'Gowun Dodum', sans-serif;
        }

        .divider {
            width: 2px;
            height: 40px;
            background: #6B4423;
            opacity: 0.3;
        }

        .exchange-rate {
            font-size: 12px;
            color: #6B4423;
            padding-top: 12px;
            border-top: 2px solid #6B4423;
            font-family: 'Gowun Dodum', sans-serif;
        }

        .update-time {
            font-size: 10px;
            color: #6B4423;
            margin-top: 15px;
            text-align: center;
            opacity: 0.7;
            font-family: 'Gowun Dodum', sans-serif;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 18px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .input-container {
                flex-direction: column;
                gap: 10px;
            }

            input[type="number"],
            select,
            button {
                width: 100%;
            }

            .result-container {
                flex-direction: column;
                gap: 10px;
            }

            .divider {
                width: 100%;
                height: 1px;
            }

            #resultKRW,
            #result {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>환율 계산기</h1>

        <div class="input-container">
            <input type="number" id="amount" placeholder="금액 입력" value="1" min="0">
            <select id="currency">
                <option value="CNY">중국 위안(CNH)</option>
                <option value="USD">미국 달러(USD)</option>
                <option value="JPY">일본 엔(JPY)</option>
                <option value="EUR">유로(EUR)</option>
                <option value="GBP">영국 파운드(GBP)</option>
                <option value="HKD">홍콩 달러(HKD)</option>
                <option value="SGD">싱가포르 달러(SGD)</option>
                <option value="THB">태국 바트(THB)</option>
            </select>
            <button onclick="calculate()">계산</button>
        </div>

        <div class="result-box">
            <div class="result-container">
                <div class="result-item">
                    <div class="result-label">원화</div>
                    <p id="resultKRW">0</p>
                </div>
                <div class="divider"></div>
                <div class="result-item">
                    <div class="result-label" id="currencyLabel">환율</div>
                    <p id="result">0</p>
                </div>
            </div>
            <div class="exchange-rate">
                <p id="exchangeRate">1원 = 0</p>
            </div>
        </div>

        <div class="update-time">
            마지막 업데이트: <span id="updateTime">-</span>
        </div>
    </div>

    <script>
        let rates = {};
        
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz-GUeRwLIcrzGfo_8PY840ZqTWuiiChJP_PgJ6nDMaBJYLRHwozeCpEsOOa3dQoyx9XQ/exec';

        async function fetchRates() {
            try {
                console.log('환율을 가져오고 있습니다...');
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                console.log('받은 환율 데이터:', data);
                
                rates = {
                    'CNY': { rate: data.CNY, name: '중국 위안(CNH)' },
                    'USD': { rate: data.USD, name: '미국 달러(USD)' },
                    'JPY': { rate: data.JPY, name: '일본 엔(JPY)' },
                    'EUR': { rate: data.EUR, name: '유로(EUR)' },
                    'GBP': { rate: data.GBP, name: '영국 파운드(GBP)' },
                    'HKD': { rate: data.HKD, name: '홍콩 달러(HKD)' },
                    'SGD': { rate: data.SGD, name: '싱가포르 달러(SGD)' },
                    'THB': { rate: data.THB, name: '태국 바트(THB)' }
                };
                
                calculate();
            } catch (error) {
                console.error('환율 로드 실패:', error);
                rates = {
                    'CNY': { rate: 0.000218, name: '중국 위안(CNH)' },
                    'USD': { rate: 0.000653, name: '미국 달러(USD)' },
                    'JPY': { rate: 0.00657, name: '일본 엔(JPY)' },
                    'EUR': { rate: 0.000715, name: '유로(EUR)' },
                    'GBP': { rate: 0.000819, name: '영국 파운드(GBP)' },
                    'HKD': { rate: 0.00514, name: '홍콩 달러(HKD)' },
                    'SGD': { rate: 0.000533, name: '싱가포르 달러(SGD)' },
                    'THB': { rate: 0.0224, name: '태국 바트(THB)' }
                };
                calculate();
            }
        }

        function calculate() {
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const rate = rates[currency];

            if (!rate || isNaN(amount) || amount < 0) {
                document.getElementById('resultKRW').textContent = '0';
                document.getElementById('result').textContent = '0';
                document.getElementById('currencyLabel').textContent = '환율';
                return;
            }

            const result = amount * rate.rate;
            document.getElementById('resultKRW').textContent = amount.toLocaleString();
            document.getElementById('result').textContent = result.toFixed(2);
            document.getElementById('currencyLabel').textContent = currency;
            document.getElementById('exchangeRate').textContent = `1 KRW = ${rate.rate.toFixed(6)} ${currency}`;
            document.getElementById('updateTime').textContent = new Date().toLocaleString('ko-KR');
        }

        document.getElementById('amount').addEventListener('input', calculate);
        document.getElementById('currency').addEventListener('change', calculate);

        window.addEventListener('load', fetchRates);
        
        setInterval(fetchRates, 5 * 60 * 1000);
    </script>
</body>
</html>
